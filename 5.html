<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM</title>
</head>
<body>
    <!-- 
    DOM : Document Object Modeling
    Seperti Pohon Keluarga
    DOM adalah jembatan yang menghubungkan antara HTML ke dalam javascript kalian
    -->

    <h1 id="heading1" class="heading1">Selamat Datang</h1>

    <script>
        let heading = document.querySelector("h1"); //[Selamat Datang, Selamat datang]
        let heading1Class = document.querySelector(".heading1");
        let heading1Id = document.querySelector("#heading1");
        let heading1New = document.querySelector('heading1');

        console.log(heading.innerText);
        
        heading.innerText = "Belajar Javascript, saya sudah jago";
        heading.innerHTML = "Belajar Javascript, saya sudah <b>Jago</b>";
    </script>
</body>
</html>
