    <form action="" method="post" onsubmit="return false">
        <label for="">Nilai 1</label>
        <input type="number" id="nilai1"><br>
        <select name="" id="operator" required>
            <option value="">Pilih Operator</option>
            <option value="+">+</option>
            <option value="-">-</option>
            <option value="*">*</option>
            <option value="/">/</option>
            <!-- <option value="%"></option> -->
        </select> <br>
        <label for="">Nilai 2</label>
        <input type="number" id="nilai2"><br>
        <label for="">Nilai 3</label>
        <input type="number" id="nilai3"><br>
        <button onclick="perhitungan()">Hasil</button>
        <!-- <button onclick="penjumlahan()">Hasil Penjumlahan</button>

        <button onclick="perkalian()">Hasil Perkalian</button>
        <button onclick="pembagian()">Hasil Pembagian</button> -->
    </form>
    <input type="text" id="hasil">

    <script>
        function perhitungan ()
        {
            let nilai1 = parseInt (document.getElementById ("nilai1").value) || 0;
            let nilai2 = parseInt (document.getElementById ("nilai2").value) || 0;
            let nilai3 = parseInt (document.getElementById ("nilai3").value) || 0;
            let operator = document.getElementById("operator").value
            let hasil = ""
            switch(operator)
            {
                case '+':
                    hasil = nilai1 + nilai2 + nilai3
                    break
                case '-':
                    hasil = nilai1 - nilai2 - nilai3
                    break
                case '*':
                    hasil = nilai1 * nilai2 * nilai3
                    break
                case '/':
                    hasil = nilai2 !=0 ? 'tidak boleh 0' : nilai1 / nilai2 / nilai3
                    break    
                default:
                    hasil = "Ngga ono cuk!!!"
                    break
            }

            document.getElementById("hasil").value = hasil;
        }
